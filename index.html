<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner de Estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --sidebar:#17141b; --sidebar-2:#211d29; --sidebar-hover:#2b2635;
  --bg:#f3f1f7; --card:#ffffff; --card-2:#faf9fc;
  --ink:#1e1b24; --muted:#6d6879; --faint:#9b96a7;
  --line:#e9e6f0;
  --purple:#7c3aed; --purple-2:#8b5cf6; --purple-soft:#efe9fe;
  --rose:#db5c88; --rose-soft:#fbe9f0;
  --green:#1d9e75; --green-soft:#e1f5ee;
  --amber:#ba7517; --amber-soft:#faeeda;
  --red:#e24b4a; --red-soft:#fcebeb;
  --blue:#378add; --blue-soft:#e6f1fb;
  --radius:14px;
  --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
}
:root[data-tema="escuro"]{
  --bg:#131118; --card:#1c1922; --card-2:#232029;
  --ink:#ece9f2; --muted:#a29caf; --faint:#7a7488;
  --line:#2e2a36;
  --purple-soft:#2c2440; --rose-soft:#3a2230; --green-soft:#16302a;
  --amber-soft:#352713; --red-soft:#3a1f1f; --blue-soft:#122c44;
}
:root[data-tema="escuro"] .sidebar{background:#0e0c12}
:root[data-tema="escuro"] ::-webkit-scrollbar-thumb{background:#3a3546}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d5d1de;border-radius:5px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:238px;background:var(--sidebar);color:#cfc9da;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;padding:20px 12px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 20px}
.brand .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--purple),var(--rose));display:flex;align-items:center;justify-content:center;font-size:19px}
.brand b{font-size:15px;color:#fff;font-weight:600;display:block;line-height:1.1}
.brand span{font-size:11px;color:#8a83a0}
.nav-group{font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:#6a6480;padding:16px 12px 7px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;font-size:14px;color:#cfc9da;width:100%;text-align:left;transition:background .12s}
.nav-item:hover{background:var(--sidebar-hover)}
.nav-item.active{background:var(--sidebar-2);color:#fff;font-weight:500}
.nav-item .ic{width:18px;text-align:center;opacity:.85}
.nav-item .dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--purple-2)}
.side-foot{margin-top:auto;padding-top:14px}

.main{margin-left:238px;flex:1;min-width:0;padding:30px 40px 60px;max-width:1180px}
.page-title{font-family:var(--serif);font-size:44px;font-weight:500;line-height:1;margin-bottom:6px;position:relative;display:inline-block}
.page-title::after{content:"";position:absolute;left:2px;right:-6px;bottom:-7px;height:3px;background:var(--rose);border-radius:3px;opacity:.85}
.page-sub{color:var(--muted);font-size:14px;margin:16px 0 26px;max-width:560px;line-height:1.55}

.row{display:flex;gap:18px;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.card h3{font-size:15px;font-weight:600;margin-bottom:2px}
.card .h-sub{font-size:12px;color:var(--faint);margin-bottom:14px}

.btn{background:var(--purple);color:#fff;padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:7px;transition:filter .12s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:var(--purple-soft);color:var(--purple)}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.line{background:transparent;border:1px solid var(--line);color:var(--muted)}

.field{margin-bottom:12px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--purple-2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.pill.purple{background:var(--purple-soft);color:var(--purple)}
.pill.rose{background:var(--rose-soft);color:var(--rose)}
.pill.green{background:var(--green-soft);color:var(--green)}
.pill.amber{background:var(--amber-soft);color:var(--amber)}
.pill.red{background:var(--red-soft);color:var(--red)}
.pill.blue{background:var(--blue-soft);color:var(--blue)}
.pill.gray{background:#eeecf2;color:var(--muted)}

.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:linear-gradient(120deg,var(--purple),#9a5cf0);border-radius:var(--radius);padding:22px 26px;color:#fff}
.stat b{font-size:30px;font-weight:600;font-family:var(--serif);display:block;line-height:1}
.stat span{font-size:12px;opacity:.85}
.progress{height:7px;background:rgba(255,255,255,.28);border-radius:6px;margin-top:16px;overflow:hidden}
.progress > i{display:block;height:100%;background:#fff;border-radius:6px}

table{width:100%;border-collapse:collapse}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -20px;padding:0 20px}
.table-wrap table{min-width:560px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:11px 10px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
.empty{text-align:center;color:var(--faint);padding:34px;font-size:14px}

.list-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.check{width:20px;height:20px;border-radius:50%;border:2px solid #cfc9da;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.check.on{background:var(--purple);border-color:var(--purple);color:#fff;font-size:12px}
.li-body{flex:1;min-width:0}
.li-body .t{font-size:14px;font-weight:500}
.li-body .m{font-size:12px;color:var(--faint);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.done .li-body .t{text-decoration:line-through;color:var(--faint)}
.icon-btn{color:var(--faint);padding:4px 7px;border-radius:6px;font-size:13px}
.icon-btn:hover{background:#f0eef5;color:var(--muted)}

.area-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.area-tab{padding:7px 15px;border-radius:20px;font-size:13px;font-weight:500;background:var(--card);border:1px solid var(--line);color:var(--muted)}
.area-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

.bars{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-row .lbl{width:110px;font-size:13px;flex-shrink:0}
.bar-track{flex:1;height:22px;background:#f0eef5;border-radius:7px;overflow:hidden}
.bar-track > i{display:block;height:100%;border-radius:7px;transition:width .5s}
.bar-row .val{width:64px;text-align:right;font-size:13px;font-weight:600;color:var(--muted)}

.cal{display:grid;grid-template-columns:56px repeat(7,1fr);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--card);font-size:11px}
.cal .ch{background:var(--card-2);padding:9px 6px;font-weight:600;text-align:center;border-bottom:1px solid var(--line);border-left:1px solid var(--line);text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.cal .ch.corner{border-left:none}
.cal .hr{padding:8px 6px;text-align:right;color:var(--faint);border-bottom:1px solid var(--line);border-left:1px solid var(--line)}
.cal .cell{border-bottom:1px solid var(--line);border-left:1px solid var(--line);min-height:42px;padding:3px;position:relative}
.cal-ev{border-radius:5px;padding:3px 5px;font-size:10px;font-weight:500;color:#fff;margin-bottom:2px;line-height:1.2;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.mcal{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-top:none;border-radius:var(--radius);overflow:hidden;background:var(--card)}
.mc-head{background:var(--card-2);padding:9px 6px;font-weight:600;text-align:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line);border-left:1px solid var(--line);text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-size:11px}
.mc-head:first-child{border-left:none}
.mc-cell{border-bottom:1px solid var(--line);border-left:1px solid var(--line);min-height:96px;padding:6px}
.mc-cell:nth-child(7n+1){border-left:none}
.cal-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-scroll .mcal{min-width:640px}
.mc-empty{background:var(--card-2)}
.mc-num{font-size:12px;color:var(--faint);font-weight:600;margin-bottom:4px}
.mc-today .mc-num{background:var(--purple);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mc-click{cursor:pointer;transition:background .12s}
.mc-click:hover{background:var(--purple-soft)}
.cal-ev{cursor:default}

.modal-bg{position:fixed;inset:0;background:rgba(20,16,28,.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:var(--card);border-radius:18px;padding:26px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--serif);font-size:24px;font-weight:500;margin-bottom:18px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1;justify-content:center}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 20px;border-radius:11px;font-size:13px;z-index:80;opacity:0;transition:opacity .2s,transform .2s}

.timer-fab{position:fixed;right:24px;bottom:24px;z-index:40;width:56px;height:56px;border-radius:50%;
  background:var(--purple);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(124,58,237,.4);transition:transform .12s}
.timer-fab:hover{transform:scale(1.06)}
.timer-fab-running{width:auto;min-width:56px;padding:0 18px;border-radius:28px;gap:8px;font-family:var(--sans);font-size:14px;font-weight:700;letter-spacing:.02em;background:var(--rose)}
.timer-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:timerPulse 1.2s infinite ease-in-out}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.3}}
.timer-panel{position:fixed;right:24px;bottom:24px;z-index:40;width:270px;max-width:calc(100vw - 32px);
  background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;
  box-shadow:0 12px 32px rgba(20,16,28,.22)}
.timer-panel input,.timer-panel select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--card-2);color:var(--ink)}
.timer-clock-big{font-family:var(--serif);font-size:38px;font-weight:600;color:var(--rose);text-align:center;margin:6px 0 4px}
@media(max-width:820px){
  .timer-fab,.timer-panel{right:16px;bottom:16px}
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}


.tag-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.hist-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{background:var(--purple-soft);color:var(--purple);border-radius:16px;padding:5px 11px;font-size:12px;font-weight:500;transition:filter .12s}
.chip:hover{filter:brightness(.96)}
.st-select{padding:5px 8px;border:1px solid var(--line);border-radius:8px;background:var(--card-2);color:var(--ink);font-size:12px;font-weight:600}
.st-select:focus{outline:none;border-color:var(--purple-2)}
.alert-late{border:1px solid var(--red);background:var(--red-soft)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,14,.45);z-index:55}
.sidebar-overlay.show{display:block}
@media(max-width:820px){
  html,body{overflow-x:hidden}
  .sidebar{transform:translateX(-100%);transition:transform .2s;z-index:60}
  .sidebar.open{transform:none}
  .main{margin-left:0;padding:20px}
  .menu-btn{display:flex !important}
  .stat-row{grid-template-columns:1fr 1fr 1fr;padding:18px}
  .stat b{font-size:24px}
  .grid2{grid-template-columns:1fr}
  input,select,textarea{font-size:16px}
  .page-title{font-size:34px}
  .modal{width:100%;max-width:none;border-radius:16px 16px 0 0;position:fixed;left:0;right:0;bottom:0;max-height:88vh;padding:22px 20px calc(20px + env(safe-area-inset-bottom))}
  .modal-bg{align-items:flex-end;padding:0}
  .row{flex-direction:column}
  .row .card{min-width:0}
}
@media(max-width:420px){
  .stat-row{grid-template-columns:1fr 1fr 1fr;gap:6px;padding:14px}
  .stat b{font-size:19px}
  .stat span{font-size:10px}
  .page-title{font-size:28px}
  .main{padding:14px}
  .area-tabs{gap:6px}
  .area-tab{padding:6px 11px;font-size:12px}
  table{font-size:13px}
  th,td{padding:9px 7px}
}
.menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:70;background:var(--sidebar);color:#fff;width:40px;height:40px;border-radius:10px;align-items:center;justify-content:center;font-size:18px}
</style>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
<button class="menu-btn" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">✷</div>
      <div><b>Meu Planner</b><span>Sistema de Estudos</span></div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <button class="nav-item" onclick="toggleTema()"><span class="ic" id="temaIc">◐</span> <span id="temaLbl">Modo escuro</span></button>
      <button class="nav-item" onclick="exportData()"><span class="ic">⭳</span> Exportar dados</button>
      <button class="nav-item" onclick="document.getElementById('importFile').click()"><span class="ic">⭱</span> Importar dados</button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(this)">
    </div>
  </aside>
  <main class="main" id="view"></main>
</div>
<div id="modalRoot"></div>
<div id="timerWidget"></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- Data layer ---------------- */
const AREAS = [
  {id:'unitins', nome:'UNITINS', cor:'#378add', conta:true},
  {id:'ingles',  nome:'Inglês',  cor:'#1d9e75', conta:true},
  {id:'espanhol',nome:'Espanhol',cor:'#ba7517', conta:true},
  {id:'pibiex',  nome:'PIBIEX',  cor:'#7c3aed', conta:true},
  {id:'ia',      nome:'IA',      cor:'#db5c88', conta:true},
  {id:'tre',     nome:'TRE (trabalho)', cor:'#6d6879', conta:false}, // NUNCA conta como estudo
];
const areaById = id => AREAS.find(a=>a.id===id) || {nome:'—',cor:'#999',conta:true};

const DEFAULT_GRADE = [
  ['Segunda','07h-08h','unitins','UNITINS'],['Segunda','08h-08h10','ingles','Inglês Busuu'],
  ['Segunda','08h10-08h20','espanhol','Espanhol Busuu'],['Segunda','08h20-08h25','espanhol','Espanhol Drops'],
  ['Segunda','09h-19h','tre','TRE (trabalho)'],['Segunda','20h-21h','pibiex','PIBIEX'],['Segunda','21h-22h','espanhol','Espanhol Kultivi'],
  ['Terça','07h-08h','unitins','UNITINS'],['Terça','08h-08h10','ingles','Inglês Busuu'],
  ['Terça','08h10-08h20','espanhol','Espanhol Busuu'],['Terça','08h20-08h25','espanhol','Espanhol Drops'],
  ['Terça','09h-19h','tre','TRE (trabalho)'],['Terça','20h-21h','ingles','Inglês BBC'],
  ['Terça','21h-22h','espanhol','Espanhol Kultivi + IA'],['Terça','22h-22h10','espanhol','Espanhol Fala'],
  ['Quarta','07h-08h','unitins','UNITINS'],['Quarta','08h-08h10','ingles','Inglês Busuu'],
  ['Quarta','08h10-08h20','espanhol','Espanhol Busuu'],['Quarta','08h20-08h25','espanhol','Espanhol Drops'],
  ['Quarta','09h-19h','tre','TRE (trabalho)'],['Quarta','20h-21h','pibiex','PIBIEX'],
  ['Quarta','21h-22h','ingles','Inglês BBC + IA'],['Quarta','22h-22h10','ingles','Inglês Fala'],
  ['Quinta','07h-08h','unitins','UNITINS'],['Quinta','08h-08h10','ingles','Inglês Busuu'],
  ['Quinta','08h10-08h20','espanhol','Espanhol Busuu'],['Quinta','08h20-08h25','espanhol','Espanhol Drops'],
  ['Quinta','09h-19h','tre','TRE (trabalho)'],['Quinta','20h-21h','pibiex','PIBIEX'],
  ['Quinta','21h-22h','espanhol','Espanhol Áudios'],['Quinta','22h-22h10','espanhol','Espanhol Fala'],
  ['Sexta','07h-08h','unitins','UNITINS'],['Sexta','08h-08h10','ingles','Inglês Busuu'],
  ['Sexta','08h10-08h20','espanhol','Espanhol Busuu'],['Sexta','08h20-08h25','espanhol','Espanhol Drops'],
  ['Sexta','09h-19h','tre','TRE (trabalho)'],['Sexta','20h-21h','pibiex','PIBIEX'],['Sexta','21h-22h','ingles','Inglês Encontro'],
  ['Sábado','08h-10h','ia','IA'],['Sábado','10h30-12h','ingles','Encontro Poliglota'],
  ['Domingo','10h-12h','ia','IA'],
].map((r,i)=>({id:'g'+i,dia:r[0],horario:r[1],area:r[2],atividade:r[3]}));
const DIAS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'];


// === CONEXÃO FIREBASE ===
const firebaseConfig = {
  apiKey: "AIzaSyDWzXgW5PFOkuZas0QFQFStiGg_fVs_iyA",
  authDomain: "meu-planner-rotina.firebaseapp.com",
  databaseURL: "https://meu-planner-rotina-default-rtdb.firebaseio.com",
  projectId: "meu-planner-rotina",
  storageBucket: "meu-planner-rotina.firebasestorage.app",
  messagingSenderId: "286056248817",
  appId: "1:286056248817:web:2365b794accb1cdc468050",
  measurementId: "G-Y4PQ172L0Y"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
// === FIM DA CONEXÃO ===

const store = {
  logs:[], pendencias:[], materias:[], aulas:[], entregaveis:[],
  grade: DEFAULT_GRADE.map(g=>({...g})),
  metaSemanal: 20,
  metasArea: {}, 
  tema: 'claro',
};

function save(){
  db.ref('meu_planner').set(store);
}

function load(){
  db.ref('meu_planner').once('value').then((snapshot) => {
    const d = snapshot.val();
    if(d){
      Object.assign(store, d);
      if(!store.grade) store.grade=DEFAULT_GRADE.map(g=>({...g}));
      if(store.metaSemanal==null) store.metaSemanal=20;
      if(!store.metasArea) store.metasArea={};
      if(!store.tema) store.tema='claro';
    }
    aplicarTema();
    renderNav();
    go('dashboard');
  }).catch((error) => {
    console.error("Erro ao carregar dados:", error);
    aplicarTema();
    renderNav();
    go('dashboard');
  });
}

function aplicarTema(){document.documentElement.setAttribute('data-tema',store.tema||'claro');}

function toggleTema(){ 
  store.tema=(store.tema==='escuro')?'claro':'escuro'; 
  save(); 
  aplicarTema(); 
  renderNav(); 
  go(current); 
}
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------------- Cronômetro ---------------- */
let timerState = {running:false, area:'unitins', atividade:'', startedAt:null};
let timerPanelOpen = false;
let timerIntervalId = null;

function loadTimerState(){
  try{const raw=localStorage.getItem('planner_timer_v1');
    if(raw){const d=JSON.parse(raw); if(d&&typeof d==='object')Object.assign(timerState,d);}
  }catch(e){}
}
function saveTimerState(){

function fmtHMS(ms){
  const s=Math.max(0,Math.floor(ms/1000));
  const hh=Math.floor(s/3600), mm=Math.floor((s%3600)/60), ss=s%60;
  const p=n=>String(n).padStart(2,'0');
  return hh>0?`${p(hh)}:${p(mm)}:${p(ss)}`:`${p(mm)}:${p(ss)}`;
}

/* ---------------- Date helpers ---------------- */
const todayISO = ()=> new Date().toISOString().slice(0,10);
function weekKey(iso){const d=new Date(iso+'T00:00');const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);
  const t=new Date(d.getFullYear(),0,1);const w=Math.ceil(((d-t)/86400000+1)/7);return d.getFullYear()+'-S'+String(w).padStart(2,'0');}
function monthKey(iso){return iso.slice(0,7);}
function fmtBR(iso){if(!iso)return'—';const[y,m,d]=iso.slice(0,10).split('-');return d+'/'+m+'/'+y;}
function durH(ini,fim){if(!ini||!fim)return 0;const a=ini.split(':').map(Number),b=fim.split(':').map(Number);
  let min=(b[0]*60+b[1])-(a[0]*60+a[1]); if(min<0)min+=1440; return Math.round(min/60*100)/100;}
function durMin(ini,fim){if(!ini||!fim)return 0;const a=ini.split(':').map(Number),b=fim.split(':').map(Number);
  let min=(b[0]*60+b[1])-(a[0]*60+a[1]); if(min<0)min+=1440; return min;}
// formata horas decimais (ex: 1.5) como "1h 30min"
function fmtDur(horasDecimais){
  const totalMin=Math.round(horasDecimais*60);
  const hh=Math.floor(totalMin/60), mm=totalMin%60;
  if(hh===0&&mm===0)return '0min';
  if(hh===0)return mm+'min';
  if(mm===0)return hh+'h';
  return hh+'h '+mm+'min';
}

/* ---------------- Study hours (TRE excluded) ---------------- */
function countableLogs(){return store.logs.filter(l=>areaById(l.area).conta);}
function hoursBy(fn){const m={};countableLogs().forEach(l=>{const k=fn(l);m[k]=(m[k]||0)+durH(l.ini,l.fim);});return m;}
function hoursThisWeek(){const wk=weekKey(todayISO());return countableLogs().filter(l=>weekKey(l.data)===wk).reduce((s,l)=>s+durH(l.ini,l.fim),0);}
function hoursThisWeekByArea(areaId){const wk=weekKey(todayISO());
  return countableLogs().filter(l=>l.area===areaId&&weekKey(l.data)===wk).reduce((s,l)=>s+durH(l.ini,l.fim),0);}
function studyStreak(){
  // dias consecutivos (terminando hoje ou ontem) com ao menos uma sessão que conta
  const dias=new Set(countableLogs().map(l=>l.data));
  if(!dias.size)return 0;
  let streak=0; const d=new Date();
  // se não estudou hoje ainda, começa a contar de ontem para não zerar durante o dia
  if(!dias.has(d.toISOString().slice(0,10))) d.setDate(d.getDate()-1);
  while(dias.has(d.toISOString().slice(0,10))){streak++; d.setDate(d.getDate()-1);}
  return streak;
}
function isAtrasado(prazo,done){if(!prazo||done)return false;return prazo<todayISO();}

  const hojeStr=todayISO();
  store.pendencias.filter(p=>p.prazo&&!p.done).forEach(p=>{const late=p.prazo<hojeStr;
    const c=late?'var(--red)':p.prio==='Alta'?'var(--red)':p.prio==='Média'?'var(--amber)':'var(--muted)';
    push(p.prazo,`<div class="cal-ev" style="background:${c}" title="Pendência: ${h(p.nome)}${late?' (atrasada)':''}">${late?'⚠ ':''}${h(p.nome)}</div>`);});

  for(let i=0;i<startOffset;i++)cells+=`<div class="mc-cell mc-empty"></div>`;

function delLog(id){store.logs=store.logs.filter(l=>l.id!==id);save();vDiarios();}
function recentActivities(area){
  // atividades únicas mais recentes SOMENTE da área selecionada
  const seen=new Set(); const out=[];
  [...store.logs].sort((a,b)=>(b.data+b.ini).localeCompare(a.data+a.ini))
    .filter(l=>l.area===area).forEach(l=>{const a=(l.atividade||'').trim();
      if(a&&!seen.has(a)){seen.add(a);out.push(a);}});
  return out.slice(0,10);
}
function mNovaSessao(areaSel='',editId=null,prefill=null){
  const ed = editId?store.logs.find(l=>l.id===editId):null;
  const areaEff = ed?ed.area:(prefill?prefill.area:(areaSel||'unitins'));
  const rec=recentActivities(areaEff);
  const chips = rec.length ? `<div class="hist-chips" id="histChips">${rec.map(a=>
    `<button type="button" class="chip" onclick="document.getElementById('sat').value=this.textContent">${h(a)}</button>`).join('')}</div>` : '';
  const atividadeVal = ed?(ed.atividade||''):(prefill?(prefill.atividade||''):'');
  const dataVal = ed?ed.data:(prefill?prefill.data:todayISO());
  const iniVal = ed?ed.ini:(prefill?prefill.ini:'');
  const fimVal = ed?ed.fim:(prefill?prefill.fim:'');
  const obsVal = ed?(ed.obs||''):(prefill?(prefill.obs||''):'');
  modal(`<h3>${ed?'Editar sessão':prefill?'Salvar sessão do cronômetro':'Nova sessão de estudo'}</h3>
  ${prefill?`<div class="pill purple" style="margin-bottom:14px">⏱ Tempo cronometrado: ${fmtDur(durH(iniVal,fimVal))}</div>`:''}
  <div class="field"><label>Área</label><select id="sa" onchange="refreshHistChips(this.value)">${areaOptions(areaEff)}</select></div>
  <div class="field"><label>Atividade</label><input id="sat" placeholder="Ex: Busuu, BBC, Aula 04 de Cálculo" value="${h(atividadeVal)}">
    ${rec.length?`<div style="font-size:11px;color:var(--faint);margin:7px 0 4px" id="histLabel">Últimas atividades desta área (toque para reaproveitar):</div>`:`<div style="font-size:11px;color:var(--faint);margin:7px 0 4px;display:none" id="histLabel">Últimas atividades desta área (toque para reaproveitar):</div>`}${chips||'<div class="hist-chips" id="histChips"></div>'}</div>
  <div class="field"><label>Data</label><input type="date" id="sd" value="${dataVal}"></div>
  <div class="grid2">
    <div class="field"><label>Hora início</label><input type="time" id="si" value="${iniVal}"></div>
    <div class="field"><label>Hora fim</label><input type="time" id="sf" value="${fimVal}"></div>
  </div>
  <div class="field"><label>Observações (opcional)</label><textarea id="so" rows="2">${h(obsVal)}</textarea></div>
  <div class="modal-actions"><button class="btn line" onclick="closeModal()">Cancelar</button>
  <button class="btn" onclick="addLog(${ed?`'${editId}'`:'null'})">${ed?'Salvar':'Salvar sessão'}</button></div>`);}
function refreshHistChips(area){
  const rec=recentActivities(area);const box=document.getElementById('histChips');const lbl=document.getElementById('histLabel');if(!box)return;
  box.innerHTML=rec.map(a=>`<button type="button" class="chip" onclick="document.getElementById('sat').value=this.textContent">${h(a)}</button>`).join('');
  if(lbl)lbl.style.display=rec.length?'block':'none';
}
function addLog(editId=null){const area=document.getElementById('sa').value,ini=document.getElementById('si').value,fim=document.getElementById('sf').value;
  if(!ini||!fim){toast('Preencha início e fim');return;}
  const dados={area,atividade:document.getElementById('sat').value.trim(),
    data:document.getElementById('sd').value,ini,fim,obs:document.getElementById('so').value.trim()};
  if(editId){Object.assign(store.logs.find(l=>l.id===editId),dados);}
  else{store.logs.push({id:uid(),...dados});}

function vAnalytics(){
  const bySem=hoursBy(l=>weekKey(l.data));
  const byMes=hoursBy(l=>monthKey(l.data));
  const byArea=hoursBy(l=>l.area);
  const total=countableLogs().reduce((s,l)=>s+durH(l.ini,l.fim),0);
  const semanas=Object.keys(bySem).sort();
  const meses=Object.keys(byMes).sort();
  const maxSem=Math.max(1,...Object.values(bySem));
  const maxMes=Math.max(1,...Object.values(byMes));
  const areasComH=AREAS.filter(a=>a.conta);
  const maxArea=Math.max(1,...areasComH.map(a=>byArea[a.id]||0));
  const barSet=(entries,max,colorFn,lblFn)=> entries.length? entries.map(([k,v])=>`
    <div class="bar-row"><div class="lbl">${lblFn(k)}</div>
    <div class="bar-track"><i style="width:${Math.round(v/max*100)}%;background:${colorFn(k)}"></i></div>
    <div class="val">${fmtDur(v)}</div></div>`).join('') : '<div class="empty">Sem dados ainda.</div>';
  document.getElementById('view').innerHTML=`
    <div class="page-title">analytics</div>
    <div class="page-sub">Horas estudadas por semana, mês e área. O TRE fica de fora de todos os cálculos, sempre.</div>
    <div class="stat-row" style="margin-bottom:20px">
      <div class="stat"><b>${fmtDur(total)}</b><span>total estudadas</span></div>
      <div class="stat"><b>${fmtDur(hoursThisWeek())}</b><span>esta semana</span></div>
      <div class="stat"><b>${countableLogs().length}</b><span>sessões registradas</span></div>
    </div>
    <div class="card" style="margin-bottom:18px"><h3>Horas por área</h3><div class="h-sub">Comparativo geral entre as áreas</div>
      <div class="bars">${barSet(areasComH.map(a=>[a.id,byArea[a.id]||0]),maxArea,k=>areaById(k).cor,k=>areaById(k).nome)}</div></div>
    <div class="row">
      <div class="card" style="flex:1;min-width:320px"><h3>Horas por semana</h3><div class="h-sub">Evolução semanal</div>
        <div class="bars">${barSet(semanas.map(k=>[k,bySem[k]]),maxSem,()=>'var(--purple)',k=>k.replace('-S',' · S'))}</div></div>
      <div class="card" style="flex:1;min-width:320px"><h3>Horas por mês</h3><div class="h-sub">Evolução mensal</div>
        <div class="bars">${barSet(meses.map(k=>[k,byMes[k]]),maxMes,()=>'var(--rose)',k=>k)}</div></div>
    </div>`;
}

/* ---------------- Export / Import ---------------- */
function exportData(){const blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='planner-estudos-backup-'+todayISO()+'.json';a.click();toast('Backup exportado');}
function importData(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);Object.assign(store,d);save();go(current);toast('Dados importados');}
  catch(err){toast('Arquivo inválido');}};r.readAsText(f);inp.value='';}

/* ---------------- Boot ---------------- */
load();
loadTimerState();
timerEnsureTicking();
renderTimerWidget();
</script>
